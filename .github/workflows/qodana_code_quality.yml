name: Spring Boot CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# -----------------------------
# Job 1: Build & Test
# -----------------------------
jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: temurin

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

  # -----------------------------
  # Job 2: Start PostgreSQL
  # -----------------------------
  start-db:
    runs-on: ubuntu-latest
    needs: build-test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testaction
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          sleep 15

  # -----------------------------
  # Job 3: Run Spring Boot + Test API
  # -----------------------------
  run-app:
    runs-on: ubuntu-latest
    needs: start-db
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testaction
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: temurin

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Run Spring Boot App
        run: mvn spring-boot:run &

      - name: Wait for app to start
        run: sleep 20

      - name: Test API endpoint
        run: curl -v http://localhost:8080/api/v1/students || echo "API not ready yet"