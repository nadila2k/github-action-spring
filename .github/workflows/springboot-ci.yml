name: Spring Boot Matrix CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        java: [21, 20]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testaction
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

      - name: Run Spring Boot App
        run: mvn spring-boot:run &

      - name: Wait for app to start
        run: sleep 20

      - name: Test API endpoint
        run: |
          curl -v http://localhost:8080/api/v1/students || echo "API not ready yet"