name: Spring Boot Matrix CI with Error Handling

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        java: [21, 20]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testaction
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Build with Maven
        run: |
          echo "Building project..."
          mvn clean package -DskipTests
        continue-on-error: false

      - name: Run tests
        run: |
          echo "Running tests..."
          if ! mvn test; then
            echo "❌ Tests failed!"
            exit 1
          fi

      - name: Run Spring Boot App
        run: |
          echo "Starting Spring Boot application..."
          nohup mvn spring-boot:run > springboot.log 2>&1 &
          sleep 20

      - name: Check if app started
        run: |
          if ! curl -s http://localhost:8080/api/v1/students > /dev/null; then
            echo "❌ Spring Boot app failed to start or API not reachable."
            echo "Logs:"
            cat springboot.log
            exit 1
          else
            echo "✅ Spring Boot app is running."
          fi

      - name: Test API endpoint
        run: |
          echo "Testing /students API..."
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/students)
          if [ "$response" -ne 200 ]; then
            echo "❌ API test failed with status code $response"
            exit 1
          else
            echo "✅ API test passed with status code $response"
          fi